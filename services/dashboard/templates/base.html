<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BrogiASIST — {% block title %}Dashboard{% endblock %}</title>
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="icon" type="image/png" sizes="96x96" href="/static/favicon-96.png">
<link rel="icon" type="image/png" sizes="192x192" href="/static/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/favicon-180-precomposed.png">
<link rel="apple-touch-icon" sizes="152x152" href="/static/favicon-152-precomposed.png">
<link rel="apple-touch-icon" sizes="144x144" href="/static/favicon-144-precomposed.png">
<link rel="apple-touch-icon" sizes="120x120" href="/static/favicon-120-precomposed.png">
<link rel="apple-touch-icon" sizes="114x114" href="/static/favicon-114-precomposed.png">
<link rel="apple-touch-icon" sizes="76x76" href="/static/favicon-76.png">
<link rel="apple-touch-icon" sizes="72x72" href="/static/favicon-72-precomposed.png">
<link rel="apple-touch-icon" sizes="57x57" href="/static/favicon-57.png">
<meta http-equiv="refresh" content="{% block refresh %}60{% endblock %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ── DESIGN TOKENS (dark výchozí) ── */
  :root {
    --bg:          #0d1117;
    --surface:     #161b22;
    --surface-2:   #1c2128;
    --surface-3:   #21262d;
    --border:      #21262d;
    --border-b:    rgba(90,158,111,.4);
    --text:        #e6edf3;
    --text-muted:  #8b949e;
    --text-dim:    #3d444d;
    --accent:      #5a9e6f;
    --accent-dark: #2d6b45;
    --accent-dim:  rgba(90,158,111,.12);
    --accent-glow: rgba(90,158,111,.25);
    --blue:        #58a6ff;
    --red:         #f85149;
    --orange:      #f0883e;
    --yellow:      #e3b341;
    --nav-h:       56px;
    --font-ui:     'DM Sans', system-ui, sans-serif;
    --font-mono:   'JetBrains Mono', monospace;
    --radius-sm:   4px;
    --radius-md:   6px;
    --radius-lg:   8px;
    /* zpětná kompatibilita */
    --primary:     #5a9e6f;
    --primary-l:   #7dc48f;
    --primary-d:   #2d6b45;
    --muted:       #6e7681;
  }
  html[data-theme="light"] {
    --bg:          #f6f8f6;
    --surface:     #ffffff;
    --surface-2:   #edf2ed;
    --surface-3:   #dde8dd;
    --border:      #d0dbd0;
    --border-b:    rgba(45,107,69,.5);
    --text:        #1c2128;
    --text-muted:  #4a5568;
    --text-dim:    #9aa5b4;
    --accent:      #2d6b45;
    --accent-dark: #1a4a2e;
    --accent-dim:  rgba(45,107,69,.1);
    --accent-glow: rgba(45,107,69,.2);
    --primary:     #2d6b45;
    --primary-l:   #2d6b45;
    --primary-d:   #1a4a2e;
    --muted:       #57606a;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) {
      --bg:#f6f8f6;--surface:#fff;--surface-2:#edf2ed;--surface-3:#dde8dd;
      --border:#d0dbd0;--border-b:rgba(45,107,69,.5);
      --text:#1c2128;--text-muted:#4a5568;--text-dim:#9aa5b4;
      --accent:#2d6b45;--accent-dark:#1a4a2e;--accent-dim:rgba(45,107,69,.1);--accent-glow:rgba(45,107,69,.2);
      --primary:#2d6b45;--primary-l:#2d6b45;--primary-d:#1a4a2e;--muted:#57606a;
    }
  }

  /* ── ANIMACE ── */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  @keyframes logoPulse {
    0%,100% { transform: scale(1);    box-shadow: 0 0 12px var(--accent-glow); }
    50%     { transform: scale(1.08); box-shadow: 0 0 30px var(--accent-glow); }
  }

  /* ── RESET ── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-ui); background: var(--bg); color: var(--text); font-size: 12px; -webkit-font-smoothing: antialiased; }
  code, .mono { font-family: var(--font-mono); font-size: 10px; }

  /* ── NAV — var(--surface), mění se s tématem ── */
  nav {
    position: sticky; top: 0; z-index: 50;
    height: var(--nav-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 12px;
  }
  /* zelená accent linka na spodku navu — jako BrogiSERVER */
  nav::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 40%, var(--accent-dark) 60%, transparent 100%);
    opacity: .45;
  }

  /* logo */
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-wrap {
    width: 40px; height: 40px; border-radius: var(--radius-lg);
    background: var(--surface-3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; padding: 3px;
    animation: logoPulse 1.5s ease-in-out infinite;
  }
  .nav-logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .nav-logo-name { font-family: var(--font-ui); font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
  .nav-logo-name em { color: var(--accent); font-style: normal; }
  .nav-badge {
    font-family: var(--font-mono); font-size: 12px; font-weight: 700;
    color: #fff; background: var(--accent); padding: 2px 8px; border-radius: var(--radius-sm);
  }
  .nav-ver { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-left: 2px; }

  /* nav separator */
  .nav-div { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }

  /* nav tabs */
  .nav-links { display: flex; gap: 2px; }
  .nav-links a {
    font-family: var(--font-mono); font-size: 13px; font-weight: 500;
    padding: 5px 12px; border-radius: var(--radius-sm);
    text-decoration: none; text-transform: uppercase; letter-spacing: .04em;
    color: var(--text-dim); border: 1px solid transparent; transition: all .12s;
  }
  .nav-links a:hover { background: var(--accent-dim); color: var(--text-muted); }
  .nav-links a.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-dark); font-weight: 700; }

  /* right side */
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  /* service dots */
  .nav-health { display: flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .svc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); transition: background .3s, box-shadow .3s; flex-shrink: 0; }
  .svc-dot.ok   { background: var(--accent);  box-shadow: 0 0 5px var(--accent); }
  .svc-dot.fail { background: var(--red);     box-shadow: 0 0 5px var(--red); animation: blink 1s infinite; }
  .svc-dot.wait { background: var(--yellow);  box-shadow: 0 0 4px var(--yellow); }

  /* 3-icon theme toggle — přesně jako BrogiSERVER */
  .theme-toggle {
    display: flex; border-radius: var(--radius-sm);
    border: 1px solid var(--border); overflow: hidden;
  }
  .tt-btn {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 26px;
    background: var(--surface-2); border: none;
    color: var(--text-dim); cursor: pointer; transition: all .12s;
  }
  .tt-btn + .tt-btn { border-left: 1px solid var(--border); }
  .tt-btn:hover { background: var(--accent-dim); color: var(--accent); }
  .tt-btn.active { background: var(--accent-dim); color: var(--accent); }
  .tt-btn svg { width: 14px; height: 14px; }

  /* fetch-now button */
  .btn-fetch {
    display: flex; align-items: center; gap: 5px;
    padding: 0 10px; height: 26px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-muted);
    font-family: var(--font-mono); font-size: 11px;
    cursor: pointer; transition: all .12s; white-space: nowrap;
  }
  .btn-fetch:hover { background: var(--accent-dim); border-color: var(--accent-dark); color: var(--accent); }
  .btn-fetch.loading { opacity: .6; pointer-events: none; }
  .btn-fetch.ok  { border-color: var(--accent); color: var(--accent); }
  .btn-fetch.err { border-color: var(--red);    color: var(--red); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin .7s linear infinite; }

  /* ── CONTENT ── */
  .page { padding: 12px; }

  /* ── CARDS ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px; }
  .card h2 { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em;
             margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; font-family: var(--font-mono); }

  /* ── BADGES ── */
  .badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 700; }
  .ok      { background: #1a3820; color: #7dc48f; }
  .fail    { background: #3a1a1a; color: var(--red); }
  .pending { background: #2a2a1a; color: var(--yellow); }
  .f-dxp   { background: #0d2149; color: var(--blue); }
  .f-mbank { background: #2a1a00; color: var(--orange); }
  .f-zamek { background: #0d2e1a; color: #7dc48f; }
  .f-priv  { background: #1e1e3a; color: #a78bfa; }
  .t-ukol  { background: #3a1a1a; color: var(--red); }
  .t-fakt  { background: #2a1a00; color: var(--orange); }
  .t-info  { background: #1c2128; color: var(--text-muted); }
  .t-nl    { background: #1c2128; color: #555d69; }
  .t-notif { background: #0d2e1a; color: #7dc48f; }
  .t-nabid { background: #1e2a1a; color: #7ee787; }
  .t-potv  { background: #0d2449; color: #79c0ff; }
  .ts-ceka { background: #3a1a1a; color: var(--red); font-weight: 900; }

  html[data-theme="light"] .ok     { background: #c8ebd6; color: #1a4a2e; }
  html[data-theme="light"] .fail   { background: #fde0de; color: #8b1a1a; }
  html[data-theme="light"] .t-info { background: #e8eef8; color: #4a5568; }
  html[data-theme="light"] .f-dxp  { background: #d6e4ff; color: #1a3a8f; }

  /* ── TABLES ── */
  table { width: 100%; border-collapse: collapse; }
  td, th { padding: 3px 6px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 0; }
  th { color: var(--text-muted); font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
  td.num { text-align: right; color: var(--blue); width: 40px; max-width: 40px; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background: var(--surface-2); }

  /* ── MISC ── */
  .svc-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .svc-row:last-child { border-bottom: none; }
  .counts { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
  .count-item { text-align: center; }
  .count-num { font-size: 20px; font-weight: 700; color: var(--accent); line-height: 1; }
  .count-label { font-size: 8px; color: var(--text-muted); margin-top: 2px; }
  .empty { color: var(--text-muted); font-style: italic; font-size: 10px; padding: 6px 0; }
  .card-full { grid-column: 1 / -1; }

  {% block extra_style %}{% endblock %}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <div class="nav-logo-wrap">
      <img src="/static/logo.png" alt="BrogiASIST">
    </div>
    <span class="nav-logo-name">Brogi<em>ASIST</em></span>
    <span class="nav-badge">v1</span>
  </a>

  <div class="nav-div"></div>

  <div class="nav-links">
    <a href="/"         class="{% block nav_dashboard %}{% endblock %}">Dashboard</a>
    <a href="/pravidla" class="{% block nav_pravidla %}{% endblock %}">Pravidla</a>
    <a href="/ukoly"    class="{% block nav_ukoly %}{% endblock %}">Úkoly</a>
    <a href="/obsah"    class="{% block nav_obsah %}{% endblock %}">Obsah</a>
    <a href="/admin"    class="{% block nav_admin %}{% endblock %}">Admin</a>
  </div>

  <div class="nav-right">
    <!-- zdraví služeb -->
    <div class="nav-health">
      <span class="svc-dot wait" id="dotDB"     title="PostgreSQL"></span>
      <span class="svc-dot wait" id="dotChroma" title="ChromaDB"></span>
      <span id="statusText" style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">…</span>
    </div>

    <div class="nav-div"></div>

    <!-- fetch-now -->
    <button class="btn-fetch" id="btnFetch" onclick="fetchNow()" title="Spustit classify + notify hned">
      <span id="fetchIcon">⚡</span> Načíst
    </button>

    <div class="nav-div"></div>

    <!-- 3 ikony: měsíc / slunce / monitor — jako BrogiSERVER -->
    <div class="theme-toggle">
      <button class="tt-btn" data-mode="dark"   onclick="setTheme('dark')"   title="NOC">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="tt-btn" data-mode="light"  onclick="setTheme('light')"  title="DEN">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="tt-btn" data-mode="system" onclick="setTheme('system')" title="SYS">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </button>
    </div>
  </div>
</nav>

<div class="page">
{% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}

<script>
/* ── Theme: 3 ikony (měsíc/slunce/monitor) — jako BrogiSERVER ── */
function setTheme(mode) {
  if (mode === 'system') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', mode);
  }
  localStorage.setItem('brogi_theme', mode);
  document.querySelectorAll('.tt-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode)
  );
}
(function(){ setTheme(localStorage.getItem('brogi_theme') || 'system'); })();

/* ── Health check ── */
async function checkHealth() {
  try {
    const r = await fetch('/api/status', { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    const dbOk = d.db?.ok, chromaOk = d.chroma?.ok, allOk = dbOk && chromaOk;
    document.getElementById('dotDB').className     = 'svc-dot ' + (dbOk     ? 'ok' : 'fail');
    document.getElementById('dotChroma').className = 'svc-dot ' + (chromaOk ? 'ok' : 'fail');
    document.getElementById('dotDB').title         = 'PostgreSQL ' + (dbOk ? '✓' : '✗');
    document.getElementById('dotChroma').title     = 'ChromaDB '  + (chromaOk ? '✓' : '✗');
    const st = document.getElementById('statusText');
    st.textContent  = allOk ? '2 systems' : (dbOk || chromaOk ? '1 system' : '0 systems');
    st.style.color  = allOk ? 'var(--accent)' : 'var(--red)';
  } catch {
    document.getElementById('statusText').textContent = 'offline';
    document.getElementById('statusText').style.color = 'var(--red)';
  }
}
checkHealth();
setInterval(checkHealth, 30000);

/* ── Fetch Now ── */
async function fetchNow() {
  const btn = document.getElementById('btnFetch');
  const icon = document.getElementById('fetchIcon');
  btn.classList.add('loading');
  icon.innerHTML = '<span class="spin">↻</span>';
  btn.classList.remove('ok','err');
  try {
    const r = await fetch('/api/fetch-now', { method: 'POST', signal: AbortSignal.timeout(35000) });
    const d = await r.json();
    if (d.status === 'ok') {
      btn.classList.add('ok');
      icon.textContent = '✓';
    } else {
      btn.classList.add('err');
      icon.textContent = '✗';
    }
  } catch {
    btn.classList.add('err');
    icon.textContent = '✗';
  } finally {
    btn.classList.remove('loading');
    setTimeout(() => { btn.classList.remove('ok','err'); icon.textContent = '⚡'; }, 3000);
  }
}
</script>
</body>
</html>
